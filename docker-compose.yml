services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: acadexis
      POSTGRES_PASSWORD: acadexis
      POSTGRES_DB: acadexis
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
  redis:
    image: redis:7
    ports: ["6379:6379"]
  web:
    build: .
    env_file: .env
    ports: ["8000:8000"]
    depends_on: [db, redis]
  worker:
    build: .
    command: celery -A acadexis worker -l info
    env_file: .env
    depends_on: [db, redis]
  beat:
    build: .
    command: celery -A acadexis beat -l info
    env_file: .env
    depends_on: [db, redis]
volumes:
  pgdata: